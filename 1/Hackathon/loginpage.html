<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .background {
            background-image: url('https://wallpapercave.com/uwp/uwp4767983.jpeg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="background h-screen flex items-center justify-center">
    <div class="bg-gray-800 bg-opacity-50 p-8 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold text-white mb-6 text-center">Login</h2>
        <form onsubmit="return validateLogin(event)">
            <div class="mb-4">
                <label class="block text-white text-sm font-bold mb-2" for="username">Username</label>
                <input
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                    id="username" type="text" placeholder="Username" required>
            </div>
            <div class="mb-6">
                <label class="block text-white text-sm font-bold mb-2" for="password">Password</label>
                <input
                    class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
                    id="password" type="password" placeholder="Password" required>
            </div>
            <div class="flex items-center justify-between">
                <!-- <a href="http://127.0.0.1:5500/Hackathon/index.html"> -->
                    <button
                        class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                        type="text">
                        Login
                    </button>
                <!-- </a> -->
            </div>
        </form>
    </div>

    <script>
        function validateLogin(event) {
            event.preventDefault(); // Prevent form submission

            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            // Simple validation (Replace with actual authentication logic)
            if (username && password) {
                window.location.href = "index.html"; // Redirect to dashboard
            } else {
                alert("Please enter a valid username and password.");
            }
        }
    </script>
</body>

</html>
